name: CI

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pip install poetry

      - name: Install dev dependencies
        run: poetry install --with dev

      - name: Ruff
        run: poetry run ruff check fuzzyart tests

  # ── Tests ───────────────────────────────────────────────────────────────────
  test:
    needs: [lint]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run tests
        run: poetry run pytest --cov=fuzzyart --cov-report=xml -v tests/

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ── Docs ────────────────────────────────────────────────────────────────────
  docs:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: create static directory
        run: mkdir -p docs/_static

      - name: Install doc dependencies
        run: poetry install --with docs

      - name: Build docs
        run: poetry run sphinx-build -b html docs docs/_build/html -W

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/_build/html/

  # ── Build & Publish ─────────────────────────────────────────────────────────
publish:
  needs: [lint, test, docs]
  runs-on: ubuntu-latest
  if: startsWith(github.ref, 'refs/tags/v')

  environment:
    name: pypi
    url: https://pypi.org/p/fuzzyart

  permissions:
    id-token: write

  steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Poetry
      run: pip install poetry

    - name: Build package
      run: poetry build

    - name: Publish to PyPI (OIDC)
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        provider: pypi
        packages_dir: dist

